version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: claw_postgres
    environment:
      POSTGRES_USER: claw
      POSTGRES_PASSWORD: clawpass
      POSTGRES_DB: clawtrader
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: claw_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
