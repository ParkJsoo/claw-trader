[unix_http_server]
file=/tmp/claw-supervisor.sock

[supervisord]
logfile=logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
loglevel=info
pidfile=/tmp/claw-supervisord.pid
nodaemon=false
environment=STRATEGY_KR_COOLDOWN_SEC="300",STRATEGY_KR_DAILY_CAP="40",RISK_KR_MAX_CONCURRENT="3",RISK_KR_DAILY_LOSS_LIMIT="-500000",RISK_KR_ALLOCATION_CAP_PCT="1.00",GEN_DAILY_CALL_CAP="1500",DUAL_POLL_SEC="180",DUAL_DAILY_CALL_CAP="500",CONSENSUS_POLL_SEC="60",CONSENSUS_SYMBOL_COOLDOWN_SEC="180",MR_MIN_DROP_5M="0.005",UNIVERSE_SELECT_COUNT="12",WATCHER_TTL_CANCEL_SEC="60",EXIT_POLL_SEC="30",EXIT_STOP_LOSS_PCT="0.015",EXIT_TAKE_PROFIT_PCT="0.03",EXIT_TIME_LIMIT_SEC="3600",EXIT_TRAIL_STOP_PCT="0.015",EXIT_TIME_LIMIT_MAX_SEC="7200",WATCHLIST_KR_MAX_PRICE="50000",WATCHLIST_KR_DYNAMIC="true",EXECUTION_MODE="claude_only"

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/claw-supervisor.sock

[program:runner]
command=venv/bin/python -m app.runner
directory=/Users/henry_oc/develop/claw-trader
environment=PYTHONPATH="src",PYTHONUNBUFFERED="1"
stdout_logfile=logs/runner.log
stderr_logfile=logs/runner.log
stdout_logfile_maxbytes=10MB
autostart=true
autorestart=true
startretries=5
stopwaitsecs=10

