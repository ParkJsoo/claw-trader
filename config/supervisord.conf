[unix_http_server]
file=/tmp/claw-supervisor.sock

[supervisord]
logfile=logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
loglevel=info
pidfile=/tmp/claw-supervisord.pid
nodaemon=false

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/claw-supervisor.sock

[program:runner]
command=venv/bin/python -m app.runner
directory=/Users/henry_oc/develop/claw-trader
environment=PYTHONPATH="src",PYTHONUNBUFFERED="1"
stdout_logfile=logs/runner.log
stderr_logfile=logs/runner.log
stdout_logfile_maxbytes=10MB
autostart=true
autorestart=true
startretries=5
stopwaitsecs=10

[program:market_data_runner]
command=venv/bin/python -m app.market_data_runner
