[unix_http_server]
file=/tmp/claw-supervisor.sock

[supervisord]
logfile=logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
loglevel=info
pidfile=/tmp/claw-supervisord.pid
nodaemon=false
environment=IBKR_ACCOUNT_ID="",GEN_WATCHLIST_US="",GEN_WATCHLIST_COIN="",STRATEGY_KR_COOLDOWN_SEC="300",STRATEGY_KR_DAILY_CAP="40",RISK_KR_MAX_CONCURRENT="3",RISK_KR_DAILY_LOSS_LIMIT="-500000",RISK_KR_ALLOCATION_CAP_PCT="1.00",GEN_DAILY_CALL_CAP="1500",DUAL_POLL_SEC="60",DUAL_DAILY_CALL_CAP="5000",CONSENSUS_POLL_SEC="30",CONSENSUS_SYMBOL_COOLDOWN_SEC="300",MB_MIN_SURGE_5M="0.020",UPBIT_WATCHLIST_COUNT="30",UPBIT_MIN_VOL_KRW="5000000000",UPBIT_WATCHLIST_INTERVAL_SEC="600",UPBIT_SURGE_RATE="0.05",UPBIT_SURGE_MIN_VOL_KRW="1000000000",UPBIT_SURGE_MAX_ADD="10",WATCHLIST_SELECT_INTERVAL_MARKET_SEC="1800",WATCHLIST_DYNAMIC_VOLUME_TOP_N="50",WATCHLIST_DYNAMIC_FLUCT_TOP_N="50",WATCHLIST_DYNAMIC_MIN_VOL="100000",UNIVERSE_SELECT_COUNT="12",WATCHER_TTL_CANCEL_SEC="60",EXIT_POLL_SEC="30",EXIT_STOP_LOSS_PCT="0.025",EXIT_TAKE_PROFIT_PCT="0.05",EXIT_TIME_LIMIT_SEC="900",EXIT_TRAIL_STOP_PCT="0.020",EXIT_TIME_LIMIT_MAX_SEC="3600",COIN_EXIT_TAKE_PROFIT_PCT="0.20",COIN_EXIT_STOP_LOSS_PCT="0.040",COIN_EXIT_TRAIL_STOP_PCT="0.050",COIN_EXIT_TIME_LIMIT_SEC="3600",COIN_EXIT_TIME_LIMIT_MAX_SEC="14400",WATCHLIST_KR_MAX_PRICE="50000",WATCHLIST_KR_DYNAMIC="true",EXECUTION_MODE="claude_only",STRATEGY_COIN_DAILY_CAP="5"

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/claw-supervisor.sock

[program:runner]
command=venv/bin/python -m app.runner
directory=/Users/jeongsoopark/develop/claw-trader
environment=PYTHONPATH="src",PYTHONUNBUFFERED="1"
stdout_logfile=logs/runner.log
stderr_logfile=logs/runner.log
stdout_logfile_maxbytes=10MB
autostart=true
autorestart=true
startretries=15
stopwaitsecs=10

